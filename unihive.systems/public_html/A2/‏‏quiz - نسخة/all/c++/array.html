  <!-- زر البدء -->

  <button id="startBtn" onclick="startQuiz()">Start Quiz</button>
   
  <!-- الكويز -->
  <div class="quiz-container" id="quiz">
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <button id="nextBtn" onclick="nextQuestion()">Next</button>
  </div>

  <!-- النتيجة -->
  <div class="result" id="result">
    <h3> Quiz Result</h3>
    <div class="score-text" id="scoreText"></div>

  <by><br><br><br>
  <script>
    const questions = [
  { q: "What is an array in C++?", options: [
    "A class", "A data structure to store multiple values", "A function", "A pointer"
  ], answer: 1 },

  { q: "Which of the following is the correct way to declare an array?", options: [
    "int array;", "int array[10];", "array int[10];", "int[10] array;"
  ], answer: 1 },

  { q: "What is the index of the first element in an array?", options: [
    "0", "1", "-1", "Depends on array size"
  ], answer: 0 },

  { q: "Which of the following accesses the third element in the array 'arr'?", options: [
    "arr(3)", "arr[2]", "arr[3]", "arr{2}"
  ], answer: 1 },

  { q: "What happens if you access an out-of-bounds index in C++ array?", options: [
    "Compile-time error", "Returns zero", "Undefined behavior", "Shows warning"
  ], answer: 2 },

  { q: "What is the size of int arr[5]?", options: [
    "4", "5", "6", "0"
  ], answer: 1 },

  { q: "Which header is required for using arrays?", options: [
    "<array>", "<vector>", "<iostream>", "No header needed for basic arrays"
  ], answer: 3 },

  { q: "How are arrays stored in memory?", options: [
    "Random order", "Stack only", "Contiguous memory locations", "Heap only"
  ], answer: 2 },

  { q: "Which loop is commonly used to access array elements?", options: [
    "while", "do-while", "for", "goto"
  ], answer: 2 },

  { q: "What is the output of: int arr[3] = {1,2,3}; cout << arr[1];", options: [
    "1", "2", "3", "Error"
  ], answer: 1 },

  { q: "Can we initialize array at declaration?", options: [
    "No", "Yes", "Only in classes", "Only with new keyword"
  ], answer: 1 },

  { q: "Which keyword is used to dynamically allocate array memory?", options: [
    "malloc", "calloc", "new", "alloc"
  ], answer: 2 },

  { q: "What is the correct way to delete dynamically allocated array?", options: [
    "delete arr;", "delete[] arr;", "free(arr);", "clear arr;"
  ], answer: 1 },

  { q: "Which of the following is true about array indexes?", options: [
    "They start at 1", "They can be negative", "They must be integers", "They are optional"
  ], answer: 2 },

  { q: "How do you pass an array to a function in C++?", options: [
    "By value", "By pointer", "By reference", "By copy"
  ], answer: 1 }
];




    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
      const startBtn = document.getElementById("startBtn");
      const quizBox = document.getElementById("quiz");

      // خروج سلس
      startBtn.classList.add("fadeOut");

      setTimeout(() => {
        startBtn.style.display = "none";
        quizBox.style.display = "block";
        quizBox.classList.add("fadeInZoom");
        loadQuestion();
      }, 500);
    }


    function loadQuestion() {
      const q = questions[currentQuestion];
      document.getElementById("question").innerHTML = `${currentQuestion + 1}: ${q.q}`;
      const optionsContainer = document.getElementById("options");
      optionsContainer.innerHTML = "";
      document.getElementById("nextBtn").style.display = "none";

      q.options.forEach((opt, index) => {
        const btn = document.createElement("button");
        const spanText = document.createElement("span");
        const spanIcon = document.createElement("span");

        spanText.innerHTML = opt;
        spanIcon.className = "icon";
        spanIcon.textContent = "✔";

        btn.appendChild(spanText);
        btn.appendChild(spanIcon);
        btn.onclick = () => checkAnswer(index);
        optionsContainer.appendChild(btn);
      });
    }

    function checkAnswer(selectedIndex) {
      const q = questions[currentQuestion];
      const buttons = document.querySelectorAll("#options button");

      buttons.forEach((btn, i) => {
        btn.classList.add("disabled");
        const icon = btn.querySelector(".icon");

        if (i === q.answer) {
          btn.classList.add("correct");
          icon.textContent = "✔";
        }

        if (i === selectedIndex && i !== q.answer) {
          btn.classList.add("wrong");
          icon.textContent = "✖";
        }
      });

      if (selectedIndex === q.answer) score++;

      if (currentQuestion < questions.length - 1) {
        document.getElementById("nextBtn").style.display = "inline-block";
      } else {
        setTimeout(showFinalResult, 1000);
      }
    }

    function nextQuestion() {
      currentQuestion++;
      loadQuestion();
    }

    function showFinalResult() {
      document.getElementById("quiz").style.display = "none";
      document.getElementById("result").style.display = "block";

      const percent = Math.round((score / questions.length) * 100);
      document.getElementById("scoreText").innerText = `You scored ${score} out of ${questions.length} (${percent}%)`;
      document.getElementById("progressBar").style.width = percent + "%";

      let feedback = "";
      if (percent === 100) feedback = " Perfect! You're an HTML master!";
      else if (percent >= 80) feedback = " Great job! You know your stuff.";
      else if (percent >= 50) feedback = " Not bad, keep practicing!";
      else feedback = " Needs more study. Try again!";
      document.getElementById("feedback").innerText = feedback;
    }

    loadQuestion();
  </script>
